<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      var l = window.location;
      var segmentCount = 1;
      var p = l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/';
      var q = p + l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~');
      var s = q + (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '');
      l.replace(s + (l.hash || ''));
    </script>
  </head>
  <body></body>
</html>

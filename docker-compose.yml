# ============================================================
#  LimoFlight V4 — docker-compose.yml
#  Local development: App + PostgreSQL + Redis (sessions)
#  Usage: docker-compose up --build
# ============================================================

version: '3.9'

services:

  # ── PostgreSQL Database ────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: limoflight_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       limoflight_db
      POSTGRES_USER:     limoflight
      POSTGRES_PASSWORD: ${DB_PASSWORD:-limoflight_dev_pass}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U limoflight -d limoflight_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (sessions + real-time pub/sub) ──────────────────
  redis:
    image: redis:7-alpine
    container_name: limoflight_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-limoflight_redis}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API + WebSocket ────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: limoflight_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:                   development
      PORT:                       3001
      DATABASE_URL:               postgresql://limoflight:${DB_PASSWORD:-limoflight_dev_pass}@db:5432/limoflight_db
      REDIS_URL:                  redis://:${REDIS_PASSWORD:-limoflight_redis}@redis:6379
      JWT_SECRET:                 ${JWT_SECRET}
      ENCRYPTION_KEY:             ${ENCRYPTION_KEY}
      ALLOWED_ORIGINS:            http://localhost:5173,http://localhost:3001
      # Google
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON}
      GOOGLE_PLAY_PUBLIC_KEY:     ${GOOGLE_PLAY_PUBLIC_KEY}
      # WhatsApp
      WA_PHONE_NUMBER_ID:         ${WA_PHONE_NUMBER_ID}
      WA_ACCESS_TOKEN:            ${WA_ACCESS_TOKEN}
      # OpenTable
      OPENTABLE_CLIENT_ID:        ${OPENTABLE_CLIENT_ID}
      OPENTABLE_ACCESS_TOKEN:     ${OPENTABLE_ACCESS_TOKEN}
      # Stripe
      STRIPE_SECRET:              ${STRIPE_SECRET}
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app/server:ro   # hot-reload in dev
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3

  # ── Frontend (Vite dev server) ─────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: limoflight_frontend
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    depends_on:
      - api
    environment:
      VITE_API_URL:           http://localhost:3001
      VITE_WS_URL:            ws://localhost:3001
      VITE_GOOGLE_MAPS_KEY:   ${VITE_GOOGLE_MAPS_KEY}
      VITE_MAP_ID:            ${VITE_MAP_ID}
      VITE_APP_NAME:          LimoFlight
    volumes:
      - .:/app
      - /app/node_modules       # prevent host node_modules override
    ports:
      - "5173:5173"

volumes:
  pg_data:
  redis_data:
